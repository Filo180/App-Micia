<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Noi ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      color: white;
      background: black;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1501973801540-537f08ccae7b') center/cover no-repeat;
      position: relative;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3rem;
      font-weight: 300;
    }

    .days {
      margin-top: 15px;
      font-size: 1.2rem;
      opacity: 0.9;
    }

    /* MENU */
    .menu {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 3;
    }

    .menu button {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .dropdown {
      display: none;
      margin-top: 10px;
      background: rgba(0,0,0,0.8);
      border-radius: 10px;
      overflow: hidden;
    }

    .dropdown a {
      display: block;
      padding: 10px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .dropdown a:hover {
      background: rgba(255,255,255,0.1);
    }

    /* SEZIONE SCROLL */
    .sections {
      padding: 80px 20px;
      text-align: center;
      background: #111;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .card {
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.1);
    }

    .card span {
      margin-top: 10px;
      font-size: 0.9rem;
    }

    /* FOOTER */
    footer {
      padding: 40px;
      text-align: center;
      font-size: 0.9rem;
      background: black;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <div class="menu">
    <button onclick="toggleMenu()">☰</button>
    <div class="dropdown" id="menuDropdown">
      <a href="#">📸 Libreria foto</a>
      <a href="#">📝 Note</a>
      <a href="#">📅 Calendario</a>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="overlay"></div>
    <div class="content">
      <h1>Alessandra ❤️ Filippo</h1>
      <div class="days" id="daysTogether"></div>
    </div>
  </section>

  <!-- SEZIONI -->
  <section class="sections">
    <h2>Esplora</h2>

    <div class="icons">
      <div class="card">
        📸
        <span>Foto</span>
      </div>

      <div class="card">
        📝
        <span>Note</span>
      </div>

      <div class="card">
        📅
        <span>Calendario</span>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    Fatto con amore da Filippo! ❤️
  </footer>

  <script>
    // MENU
    function toggleMenu() {
      const menu = document.getElementById("menuDropdown");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    // CALCOLO GIORNI INSIEME
    const startDate = new Date("2025-01-28");
    const today = new Date();

    const diffTime = today - startDate;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    document.getElementById("daysTogether").innerText =
      "Insieme da " + diffDays + " giorni ❤️";
  </script>

</body>
</html>
