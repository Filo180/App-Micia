<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Note ❤️</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: #1e1e1e;
  padding: 20px;

  background: url("foto/sfondo.jpg") center/cover no-repeat fixed;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(255,255,255,0.3); /* schiarisce */
  backdrop-filter: blur(5px);

  z-index: -1;
}
/* HEADER */
h1 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 500;
}

/* FORM */
.form {
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  margin: 0 auto 20px auto;
  max-width: 400px; /* 👈 limita larghezza */
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}
textarea {
  resize: none;
  height: 80px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #7fbf9f;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #6aa98a;
}

/* GRID NOTE */
.notes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;

  max-width: 600px;      /* limita larghezza */
  margin: 0 auto;        /* centra tutto */
}

/* CARD */
.note {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);

  border-radius: 18px;
  padding: 15px;

  cursor: pointer;
  transition: 0.25s;

  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}
.note:hover {
  transform: translateY(-5px) scale(1.02);
}
/* TITOLO */
.note-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 5px;
}

/* TESTO */
.note-text {
  font-size: 12px;
  opacity: 0.7;
  overflow: hidden;
  text-overflow: ellipsis;
  max-height: 40px;
}

/* MODALE */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(0,0,0,0.4);

  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}
.modal.show {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.15);

  animation: popup 0.25s ease;
}

.modal h2 {
  margin-bottom: 10px;
}

.close {
  margin-top: 15px;
  background: #ccc;
}
@keyframes popup {
  from {
    transform: scale(0.9);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}
.note:nth-child(3n) {
  background: #eaf7f0;
}

.note:nth-child(3n+1) {
  background: #eef6fb;
}

.note:nth-child(3n+2) {
  background: #f6f3fb;
}
.note {
  animation: fadeUp 0.4s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

















</head>

<body>

<h1>Note Miciose</h1>
<p style="text-align:center; opacity:0.6; margin-bottom:20px;">
  Un piccolo spazio tutto nostro
</p>

<div class="form">
  <input id="titleInput" placeholder="Titolo">
  <textarea id="textInput" placeholder="Scrivi qualcosa..."></textarea>
  <button onclick="addNote()">Aggiungi nota</button>
</div>

<div class="notes" id="notes"></div>

<!-- MODALE -->
<div class="modal" id="modal">
  <div class="modal-content">
    <input id="editTitle">
    <textarea id="editText"></textarea>

    <button onclick="saveEdit()">Salva</button>
    <button onclick="closeModal()">Chiudi</button>
    <button onclick="deleteNote()">Elimina</button>
  </div>
</div>























<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let selectedIndex = null;

function renderNotes() {
  const container = document.getElementById("notes");
  container.innerHTML = "";
  
  if (notes.length === 0) {
  container.innerHTML = `
    <p style="text-align:center; opacity:0.5; margin-top:30px;">
      Nessuna nota ancora 🌱<br>
      Inizia a scrivere qualcosa di bello
    </p>
  `;
  return;
}

  notes.forEach((note, index) => {
    container.innerHTML += `
      <div class="note" onclick="openNote(${index})">
        <div>
          <div class="note-title">${note.title}</div>
          <div class="note-text">${note.text}</div>
        </div>
      </div>
    `;
  });
}

function addNote() {
  const title = document.getElementById("titleInput").value;
  const text = document.getElementById("textInput").value;

  if(title.trim() === "" && text.trim() === "") return;

  notes.push({ title, text });
  localStorage.setItem("notes", JSON.stringify(notes));

  document.getElementById("titleInput").value = "";
  document.getElementById("textInput").value = "";

  renderNotes();
}

function openNote(index) {
  selectedIndex = index;
  document.getElementById("editTitle").value = notes[index].title;
  document.getElementById("editText").value = notes[index].text;
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

function deleteNote() {
  notes.splice(selectedIndex, 1);
  localStorage.setItem("notes", JSON.stringify(notes));
  closeModal();
  renderNotes();
}
window.onclick = function(e) {
  const modal = document.getElementById("modal");
  if (e.target === modal) {
    closeModal();
  }
}

function saveEdit() {
  const newTitle = document.getElementById("editTitle").value;
  const newText = document.getElementById("editText").value;

  notes[selectedIndex] = {
    title: newTitle,
    text: newText
  };

  localStorage.setItem("notes", JSON.stringify(notes));

  closeModal();
  renderNotes();
}

renderNotes();
</script>

</body>
</html>
